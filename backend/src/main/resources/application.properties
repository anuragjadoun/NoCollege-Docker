spring.application.name=NotesWebsite
# ===============================
# DATABASE CONFIG
# ===============================
#spring.datasource.url=jdbc:mysql://localhost:3306/notesapp
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/notesapp
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
server.address=0.0.0.0


groq.api.key=${GROQ_API_KEY}

file.upload-dir=uploads/

# RAZORPAY

razorpay.key=${RAZORPAY_KEY}

razorpay.secret=${RAZORPAY_SECRET}

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter.json=DEBUG


spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB